<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>¡Tu cita está confirmada! · Tus Odontopediatras</title>
    <meta name="description" content="Hiciste algo muy importante hoy. Tu hijo tendrá su Primera Visita Sin Miedo con especialistas que de verdad entienden a los niños." />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Meta Pixel Code -->
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '515349950052299');
    fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=515349950052299&ev=PageView&noscript=1"
    /></noscript>
    <!-- End Meta Pixel Code -->
    <!-- Conversion tracking con atribución fbp/fbc -->
    <script>
      (function () {
        var params   = new URLSearchParams(window.location.search);
        var fbp      = params.get('fbp')   || '';
        var fbc      = params.get('fbc')   || '';
        var orderId  = params.get('order') || ('test_' + Date.now());

        /* Re-init con external_id si viene fbp desde la landing */
        if (fbp) {
          fbq('init', '515349950052299', { external_id: fbp });
        }

        var eventId = 'odp_' + orderId;

        fbq('track', 'Purchase', {
          value:        30000,
          currency:     'CLP',
          content_ids:  [orderId],
          content_type: 'product'
        }, { eventID: eventId });

        fbq('trackCustom', 'servicio_confirmado', {
          value:    30000,
          currency: 'CLP'
        });

        /* Respaldo server-side vía CAPI */
        fetch(
          '/api/meta-capi' +
          '?event_id=' + encodeURIComponent(eventId) +
          '&fbp='      + encodeURIComponent(fbp) +
          '&fbc='      + encodeURIComponent(fbc) +
          '&order='    + encodeURIComponent(orderId)
        ).catch(function () {});
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/gracias347896.jsx"></script>
  </body>
</html>
