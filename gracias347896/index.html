<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>¡Tu cita está confirmada! · Tus Odontopediatras</title>
    <meta name="description" content="Hiciste algo muy importante hoy. Tu hijo tendrá su Primera Visita Sin Miedo con especialistas que de verdad entienden a los niños." />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Meta Pixel Code -->
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '515349950052299');
    fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=515349950052299&ev=PageView&noscript=1"
    /></noscript>
    <!-- End Meta Pixel Code -->

    <!-- Paso 1a: generar event_id único para deduplicación browser+servidor -->
    <script>
      window.scEventId = 'sc_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    </script>

    <!-- Paso 1b: disparar evento navegador + enviar al servidor con mismo event_id -->
    <script>
      (function () {
        var params        = new URLSearchParams(window.location.search);
        var testEventCode = params.get('test_event_code') || '';

        /* fbp: URL param para testing → cookie _fbp en producción real */
        var fbp = params.get('fbp') ||
                  (document.cookie.match(/_fbp=([^;]+)/) || [])[1] || '';

        /* fbc: URL param para testing → cookie _fbc en producción real */
        var fbc = params.get('fbc') ||
                  (document.cookie.match(/_fbc=([^;]+)/) || [])[1] || '';

        var eventId = window.scEventId;

        /* 1. Evento navegador */
        fbq('trackCustom', 'servicio_confirmado', {
          value:    30000,
          currency: 'CLP'
        }, { eventID: eventId });

        /* 2. Enviar al servidor para deduplicación CAPI */
        fetch('/api/meta-capi', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            event_id:         eventId,
            event_source_url: window.location.href,
            fbp:              fbp,
            fbc:              fbc,
            test_event_code:  testEventCode
          })
        }).catch(function () {});
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/gracias347896.jsx"></script>
  </body>
</html>
